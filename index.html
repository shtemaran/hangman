<!doctype html>
<html lang="hy">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7a5230">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>Կախաղան</title>
</head>
<body>
  <!-- Global cast button: fixed top-right, shown on every screen so casting
       can be started/stopped anywhere. Only gameplay is actually cast. -->
  <google-cast-launcher id="castBtn" aria-label="Հեռարձակել հեռուստացույցին" title="Հեռարձակել հեռուստացույցին"></google-cast-launcher>
  <section id="menu" class="screen active">
    <h1>Ընտրեք մակարդակ</h1>
    <button class="menu-btn" data-mode="easy">
      Հեշտ
      <span class="hs" data-hs="easy"></span>
    </button>
    <button class="menu-btn" data-mode="medium">
      Միջին
      <span class="hs" data-hs="medium"></span>
    </button>
    <button class="menu-btn" data-mode="hard">
      Բարդ
      <span class="hs" data-hs="hard"></span>
    </button>
    <button class="menu-btn" data-mode="learning">
      Ուսուցում
      <span class="hs" data-hs="learning"></span>
    </button>
    <button class="menu-link" id="statsLink" type="button">Վիճակագրություն</button>
  </section>

  <section id="game" class="screen">
    <div class="topbar">
      <div id="freeInfo" aria-label="Անվճար տառեր"></div>
      <div class="topbar-right">
        <div id="score">Հաշիվ: 0</div>
        <button id="shotBtn" type="button" aria-label="Կիսվել նկարով" title="Կիսվել նկարով">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="person"></div>
    <div id="clue"></div>
    <div id="letters"></div>
    <div id="keyboard"></div>
  </section>

  <section id="stats" class="screen">
    <div class="stats-topbar">
      <button id="statsBackBtn" type="button" aria-label="Հետ">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 6 9 12 15 18"/>
        </svg>
      </button>
      <h2>Վիճակագրություն</h2>
    </div>
    <div id="statsList"></div>
    <div id="statsEmpty" style="display:none">Դեռ ոչ մի խաղ չի խաղացվել</div>
  </section>

  <section id="lose" class="screen">
    <img id="loseImg" alt="" draggable="false">
    <div id="loseLabel">Ձեր հաշիվը:</div>
    <div id="loseScore">0</div>
    <div id="loseHigh"></div>
    <div class="dialog-buttons">
      <button class="menu-btn" id="playAgainBtn">Կրկին</button>
      <button class="menu-btn" id="menuBtn">Մենյու</button>
    </div>
  </section>

  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <script src="rig/rig.js"></script>
  <script src="rig/cage.js"></script>
  <script src="rig/compat.js"></script>
  <script src="rig/suggest.js"></script>
  <script src="rig/character.js"></script>
  <script src="picker.js"></script>
  <script src="app.js"></script>
  <script src="character.js"></script>
</body>
</html>
