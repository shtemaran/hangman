<!doctype html>
<meta charset="utf-8">
<title>Marduk — blink (outline morph)</title>
<style>
  body{font-family:system-ui,sans-serif;margin:1.2rem;display:flex;flex-direction:column;gap:.8rem;align-items:flex-start}
  #stage{width:460px;height:397px;border:1px solid #ddd}
  #stage svg{width:100%;height:100%}
  .row{display:flex;gap:.8rem;align-items:center;font-size:14px}
</style>
<h3>Marduk blink — true outline morph (open eye ⇢ AI-traced closed arc)</h3>
<div id="stage">loading…</div>
<div class="row">
  <label><input type="checkbox" id="auto" checked> auto-blink</label>
  <button id="once">Blink</button>
  <label>eyeOpen <input id="scrub" type="range" min="0" max="1" step="0.01" value="1"></label>
</div>
<script>
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
Promise.all([
  fetch('../assets/marduk_semantic.svg').then(r=>r.text()),
  fetch('./eye_morph.json').then(r=>r.json())
]).then(([t,morph])=>{
  document.getElementById('stage').innerHTML=t;
  const svg=document.querySelector('#stage svg'), NS='http://www.w3.org/2000/svg';
  const G=id=>svg.querySelector('#'+id);
  G('lose').style.display='none'; G('win').style.display='';
  // replace the 4 static eye groups with two morphing paths (local win coords)
  ['win-eyes-l','win-eyes-r','win-eyes-l-blink','win-eyes-r-blink'].forEach(id=>{const e=G(id); if(e)e.remove();});
  const win=G('win'), eye={}, brow=[G('win-brows-l'),G('win-brows-r')];
  const BROW_DROP=3.0;                         // viewBox units the brows dip when fully shut (matches AI frame)
  for(const s of ['l','r']){const p=document.createElementNS(NS,'path'); p.setAttribute('fill','#081C1A'); win.appendChild(p); eye[s]=p;}
  function setD(s,tt){
    const o=morph[s].open, u=morph[s].shut; let d='';
    for(let i=0;i<o.length;i++){const x=o[i][0]*(1-tt)+u[i][0]*tt, y=o[i][1]*(1-tt)+u[i][1]*tt; d+=(i?'L':'M')+x.toFixed(2)+','+y.toFixed(2)+' ';}
    eye[s].setAttribute('d',d+'Z');
  }
  const apply=eyeOpen=>{
    const eo=clamp(eyeOpen,0,1), tt=1-eo;
    setD('l',tt); setD('r',tt);
    brow.forEach(b=>b&&b.setAttribute('transform',`translate(0 ${(1-eo)*BROW_DROP})`));
  };
  apply(1);
  // blink shape over D ms: fast close, tiny hold, fast open (eyeOpen 1->0->1)
  let blinking=false;
  function blink(D=200){
    blinking=true; const t0=performance.now();
    (function step(now){
      const p=(now-t0)/D;
      if(p>=1){apply(1);blinking=false;return;}
      const eo = p<0.4 ? 1-(p/0.4) : p<0.55 ? 0 : (p-0.55)/0.45;
      apply(clamp(eo,0,1)); requestAnimationFrame(step);
    })(t0);
  }
  document.getElementById('once').onclick=()=>blink();
  document.getElementById('scrub').oninput=e=>apply(+e.target.value);
  let next=performance.now()+1800;
  (function loop(now){
    if(document.getElementById('auto').checked && !blinking && now>next){
      blink(); if(Math.random()<0.25) setTimeout(()=>blink(),240);
      next=now+2000+Math.random()*4000;
    }
    requestAnimationFrame(loop);
  })(performance.now());
});
</script>
