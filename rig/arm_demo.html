<!doctype html>
<meta charset="utf-8">
<title>Marduk — arm (elbow spline-bone)</title>
<style>
  body{font-family:system-ui,sans-serif;margin:1.2rem;display:flex;flex-direction:column;gap:.6rem;align-items:flex-start}
  #stage{width:640px;height:236px;border:1px solid #ddd}
  #stage svg{width:100%;height:100%}
  .ctl{display:grid;grid-template-columns:70px 1fr 42px;gap:.5rem;align-items:center;font-size:13px;width:440px}
  .ctl output{text-align:right;color:#555}
</style>
<h3>Arm — elbow bend, spline-bone deformation (shoulder anchored, forearm swings)</h3>
<div id="stage">loading…</div>
<div class="ctl"><span><b>elbow</b></span><input id="bend" type="range" min="-1" max="0" step="0.01" value="0"><output>0.00</output></div>
<label><input type="checkbox" id="spline" checked> show driving spline (red = live, gray = rest/bent)</label>
<script src="./bones.js"></script>
<script>
fetch('./arm_bend.json').then(r=>r.json()).then(d=>{
  const vb=d.viewBox, NS='http://www.w3.org/2000/svg', a=d.arm;
  document.getElementById('stage').innerHTML=`<svg xmlns="${NS}" viewBox="${vb.join(' ')}"></svg>`;
  const svg=document.querySelector('#stage svg');
  const staticLine=pts=>'M '+pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' L ');
  const g=document.createElementNS(NS,'g'); g.setAttribute('transform',`translate(${a.K[0]} ${a.K[1]}) rotate(${a.deg})`);
  const p=document.createElementNS(NS,'path'); p.setAttribute('fill','#081c1a'); g.appendChild(p);
  const ov=document.createElementNS(NS,'g'); ov.setAttribute('class','spline');
  for(const pts of [a.rest,a.bent]){const s=document.createElementNS(NS,'path');s.setAttribute('d',staticLine(pts));s.setAttribute('stroke','#bbb');s.setAttribute('fill','none');s.setAttribute('stroke-width',0.8);ov.appendChild(s);}
  const live=document.createElementNS(NS,'path'); live.setAttribute('stroke','#e00'); live.setAttribute('fill','none'); live.setAttribute('stroke-width',1.2); ov.appendChild(live);
  g.appendChild(ov); svg.appendChild(g);
  const upd=v=>{p.setAttribute('d',Bones.deform(a,v));live.setAttribute('d',Bones.skelPath(a.rest,a.bent,v));};
  upd(0);
  document.getElementById('bend').oninput=e=>{const v=+e.target.value;e.target.nextElementSibling.textContent=v.toFixed(2);upd(v);};
  document.getElementById('spline').onchange=e=>{ov.style.display=e.target.checked?'':'none';};
});
</script>
